name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish src/MedicalProgress.App/MedicalProgress.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish_output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 病程助手-v1.0-win-x64
          path: publish_output/MedicalProgress.App.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish_output/MedicalProgress.App.exe
          name: 病程助手 ${{ github.ref_name }}
          body: |
            ## 病程助手 ${{ github.ref_name }}

            ### 新功能
            - 📖 从教材提取知识点
            - 🔍 病程写作时自动匹配相关知识卡片
            - 🍎 全新 Mac 风格界面

            ### 系统要求
            - Windows 10/11 64位
            - 无需安装 .NET 运行时（自包含）
