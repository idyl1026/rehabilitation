name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-v12:
    name: Build BingChengAssistant v1.2 (WPF)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/BingChengAssistant/BingChengAssistant.csproj -r win-x64

      - name: Build (check for errors)
        run: dotnet build src/BingChengAssistant/BingChengAssistant.csproj -c Release -r win-x64 --no-restore

      - name: Publish single-file exe
        run: >
          dotnet publish src/BingChengAssistant/BingChengAssistant.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --no-restore
          -o publish_v12

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 病程助手-v1.2-win-x64
          path: publish_v12/BingChengAssistant.exe
          retention-days: 30

      - name: Prepare release assets (ASCII filenames)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p release_assets
          cp publish_v12/BingChengAssistant.exe release_assets/
          cp "导入数据/知识库导入_病程模板.xlsx" release_assets/knowledge_import.xlsx
          cp "导入数据/量表导入_评定量表.xlsx" release_assets/scales_import.xlsx

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          name: "病程助手 ${{ github.ref_name }}"
          body: |
            ## 病程助手 ${{ github.ref_name }}

            ### v1.2 新特性
            - 🏥 医生登录/注册系统
            - 👤 患者管理（自动创建 Word 病例文档）
            - ✏ 病程记录（4大模板，一键复制到电子病历）
            - 🩺 康复评估（VAS/NRS/ROM/MMT）
            - 🏠 出院归档（汇总 Word + 科研索引 Excel）
            - 💊 WPF 深蓝医疗主题界面

            ### 使用方法
            下载 `BingChengAssistant.exe`，双击运行，无需安装任何依赖。

            ### 附件说明
            - `knowledge_import.xlsx` — 知识库批量导入数据（665条病程知识），在软件「知识库」窗口点「导入Excel」选择此文件
            - `scales_import.xlsx` — 评定量表批量导入数据（58个量表），在软件「设置」页点「导入量表Excel」选择此文件

            ### 系统要求
            - Windows 10 / 11（64位）
            - 约 150MB 磁盘空间
            - 不需要联网，内网可用
